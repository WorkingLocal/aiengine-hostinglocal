model_list:
  # qwen2.5:32b — primair op ai-node-i9 (standaard voor AutoBA)
  - model_name: qwen2.5-32b
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://100.126.121.11:11434

  # qwen2.5:72b — ai-node-i9, voor zware analyse
  - model_name: qwen2.5-72b
    litellm_params:
      model: ollama/qwen2.5:72b
      api_base: http://100.126.121.11:11434

  # qwen2.5:7b — primair op ai-node-i5
  - model_name: qwen2.5-7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://100.78.175.49:11434

  # Vision model — ai-engine VM (lichtgewicht, past op 12 GB)
  - model_name: qwen2.5vl-7b
    litellm_params:
      model: ollama/qwen2.5vl:7b
      api_base: http://host.docker.internal:11434

  # qwen2.5-coder:32b — ai-node-i9 (coding, schakelbaar met 72b)
  - model_name: qwen2.5-coder-32b
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://100.126.121.11:11434

  # qwen2.5-coder:7b — ai-node-i5 (snelle coding chat)
  - model_name: qwen2.5-coder-7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://100.78.175.49:11434

  # qwen2.5-coder:1.5b — ai-node-i5 (realtime autocomplete)
  - model_name: qwen2.5-coder-1.5b
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://100.78.175.49:11434

  # Alias standaard → qwen2.5-32b via ai-node-i9
  - model_name: standaard
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://100.126.121.11:11434

  # ── Embeddings — nomic-embed-text op ai-engine host ─────────────────────
  # Ollama draait lokaal op ai-engine (host.docker.internal = host-gateway)
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

  # ── Anthropic Claude (cloud) ──────────────────────────────────────────────
  # Vereist: ANTHROPIC_API_KEY in .env naast docker-compose.yml

  # Claude Sonnet 4.6 — gebalanceerd, aanbevolen voor AutoBA
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Claude Haiku 4.5 — snel en goedkoop, geschikt voor korte taken
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Claude Opus 4.8 — meest capabel, voor complexe BA-analyse
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: HostingLocal2024
  database_url: "postgresql://litellm:LiteLLM2026Local@litellm-db:5432/litellm"
  max_budget: 10.0
  budget_duration: "1mo"

litellm_settings:
  request_timeout: 10800
  drop_params: true
